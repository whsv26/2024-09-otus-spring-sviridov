spring:
  main:
    banner-mode: off
  shell:
    interactive:
      enabled: false
    command:
      version:
        enabled: false
  data:
    mongodb:
      port: 27017
      database: test
      host: localhost
de:
  flapdoodle:
    mongodb:
      embedded:
        version: 4.16.2
mongock:
  runner-type: ApplicationRunner
  migration-scan-package:
    - ru.otus.hw.changelogs
  mongo-db:
    write-concern:
      journal: false
    read-concern: local
